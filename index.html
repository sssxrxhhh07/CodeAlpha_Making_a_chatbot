<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruby AI · Crimson Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --r0:#0d0404;--r1:#1a0606;--r2:#280a0a;--r3:#3d1010;--r4:#5c1a1a;--r5:#8b2020;
  --au2:#a87420;--au3:#c9962e;--au4:#e0b84a;--au5:#f5e09a;--au6:#fffaee;
  --rmist:#e05555;--rfoam:#f4a0a0;
  --ink:#f5e8e8;--muted:#9a6666;--dim:#5a3030;
  --green:#4caf82;--blue:#5a9fd4;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--r0);color:var(--ink);}
body{display:flex;flex-direction:column;overflow:hidden;}

/* TOPBAR */
#topbar{background:linear-gradient(90deg,var(--r2),var(--r1));border-bottom:1px solid rgba(201,150,46,0.25);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#logo-wrap{display:flex;align-items:center;gap:10px;}
#logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--au2),var(--au4));border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
#brand-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--au4);line-height:1;}
#brand-sub{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
#topbar-right{display:flex;align-items:center;gap:8px;}
#status-pill{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--rmist);background:rgba(91,26,26,0.35);border:1px solid rgba(224,85,85,0.2);padding:4px 11px;border-radius:20px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--rmist);animation:livePulse 2s infinite;}
@keyframes livePulse{0%,100%{box-shadow:0 0 0 0 rgba(224,85,85,0.5);}50%{box-shadow:0 0 0 4px rgba(224,85,85,0);}}
#clear-btn{background:rgba(61,16,16,0.5);border:1px solid rgba(201,150,46,0.2);color:var(--muted);padding:4px 11px;border-radius:20px;font-size:11px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
#clear-btn:hover{color:var(--au4);border-color:rgba(201,150,46,0.45);}

/* MOOD BAR */
#mood-bar{background:var(--r1);border-bottom:1px solid rgba(201,150,46,0.1);padding:7px 14px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
#mood-bar::-webkit-scrollbar{display:none;}
.chip{padding:4px 12px;border-radius:20px;font-size:11.5px;cursor:pointer;border:1px solid rgba(201,150,46,0.18);background:rgba(40,10,10,0.55);color:var(--muted);transition:all .2s;white-space:nowrap;font-weight:500;}
.chip.active,.chip:hover{background:rgba(201,150,46,0.16);border-color:rgba(201,150,46,0.45);color:var(--au4);}

/* MESSAGES */
#msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;}
#msgs::-webkit-scrollbar{width:3px;}
#msgs::-webkit-scrollbar-thumb{background:rgba(201,150,46,0.2);border-radius:3px;}

.row{display:flex;gap:9px;max-width:88%;}
.row.bot{align-self:flex-start;}
.row.user{align-self:flex-end;flex-direction:row-reverse;}
.av{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px;}
.bot .av{background:linear-gradient(135deg,var(--r3),var(--r2));border:1px solid rgba(201,150,46,0.2);}
.user .av{background:linear-gradient(135deg,var(--au2),var(--au4));color:var(--r0);font-size:12px;font-weight:700;}
.col{display:flex;flex-direction:column;gap:3px;}
.bubble{padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.7;word-break:break-word;}
.bot .bubble{background:rgba(61,16,16,0.5);border:1px solid rgba(201,150,46,0.12);color:var(--ink);border-bottom-left-radius:3px;}
.user .bubble{background:linear-gradient(135deg,rgba(201,150,46,0.2),rgba(224,184,74,0.1));border:1px solid rgba(201,150,46,0.32);color:var(--au5);border-bottom-right-radius:3px;}
.bubble b,.bubble strong{color:var(--au4);}
.bubble .section-label{display:inline-block;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--au3);margin-bottom:6px;font-weight:600;}
.meta{font-size:10px;color:var(--dim);display:flex;align-items:center;gap:5px;}
.row.user .meta{justify-content:flex-end;}
.msg-actions{display:flex;gap:6px;margin-top:3px;opacity:0;transition:opacity .2s;}
.row:hover .msg-actions{opacity:1;}
.msg-act-btn{background:none;border:1px solid rgba(201,150,46,0.15);color:var(--dim);padding:2px 8px;border-radius:10px;font-size:10px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.msg-act-btn:hover{color:var(--au4);border-color:rgba(201,150,46,0.4);}

/* EXPANDABLE SECTIONS */
.expand-section{margin-top:10px;border-top:1px solid rgba(201,150,46,0.1);padding-top:8px;}
.expand-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:5px 0;color:var(--au3);font-size:12px;font-weight:600;letter-spacing:.5px;user-select:none;}
.expand-header:hover{color:var(--au4);}
.expand-arrow{transition:transform .25s;font-size:10px;}
.expand-arrow.open{transform:rotate(180deg);}
.expand-body{max-height:0;overflow:hidden;transition:max-height .35s ease, opacity .3s;opacity:0;font-size:12.5px;line-height:1.7;color:var(--ink);}
.expand-body.open{max-height:600px;opacity:1;}
.expand-body p{margin-top:7px;}
.expand-body ul{margin-top:7px;padding-left:16px;}
.expand-body li{margin-bottom:4px;}

/* QUICK REPLIES */
.qr-wrap{display:flex;flex-wrap:wrap;gap:7px;padding-left:41px;}
.qr{padding:6px 13px;border-radius:18px;font-size:11.5px;cursor:pointer;border:1px solid rgba(201,150,46,0.28);background:rgba(28,8,8,0.8);color:var(--au4);transition:all .2s;font-weight:500;}
.qr:hover{background:rgba(201,150,46,0.18);border-color:var(--au3);transform:translateY(-1px);}

/* SUGGESTION CARD */
.sug-card{background:rgba(40,10,10,0.7);border:1px solid rgba(201,150,46,0.15);border-radius:13px;padding:12px 14px;margin-left:41px;}
.sug-title{font-size:10px;letter-spacing:1.3px;text-transform:uppercase;color:var(--au3);font-weight:600;margin-bottom:9px;}
.sug-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.sug-opt{padding:8px 10px;background:rgba(13,4,4,0.55);border:1px solid rgba(201,150,46,0.1);border-radius:9px;cursor:pointer;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:7px;transition:all .2s;}
.sug-opt:hover{background:rgba(201,150,46,0.1);border-color:rgba(201,150,46,0.32);color:var(--au5);transform:translateY(-1px);}

/* TYPING */
.typing-row{display:flex;gap:9px;}
.typing-bub{padding:11px 14px;background:rgba(61,16,16,0.5);border:1px solid rgba(201,150,46,0.12);border-radius:14px;border-bottom-left-radius:3px;display:flex;gap:4px;align-items:center;}
.td{width:5px;height:5px;border-radius:50%;background:var(--rmist);animation:td 1.3s ease-in-out infinite;}
.td:nth-child(2){animation-delay:.15s;background:var(--au3);}
.td:nth-child(3){animation-delay:.3s;}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:.35;}30%{transform:translateY(-4px);opacity:1;}}

/* INPUT ZONE */
#input-zone{flex-shrink:0;padding:10px 14px 14px;background:linear-gradient(180deg,rgba(13,4,4,0),rgba(13,4,4,0.97) 28%);border-top:1px solid rgba(201,150,46,0.1);}
#inp-row{display:flex;gap:8px;align-items:flex-end;}
#inp-wrap{flex:1;background:rgba(28,8,8,0.7);border:1px solid rgba(201,150,46,0.22);border-radius:13px;display:flex;align-items:flex-end;transition:all .2s;overflow:hidden;}
#inp-wrap:focus-within{border-color:rgba(201,150,46,0.5);box-shadow:0 0 0 3px rgba(201,150,46,0.06);}
#inp{flex:1;background:transparent;border:none;outline:none;padding:10px 13px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);resize:none;min-height:42px;max-height:100px;line-height:1.5;}
#inp::placeholder{color:var(--dim);}
#send{width:42px;height:42px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--r5),var(--au3));color:var(--r0);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
#send:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 22px rgba(201,150,46,0.42);}
#send:disabled{opacity:.35;cursor:not-allowed;}
#inp-footer{display:flex;justify-content:space-between;margin-top:7px;padding:0 2px;font-size:10px;color:var(--dim);}
#inp-footer span{color:var(--au2);}

/* MISC */
.divider{text-align:center;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--dim);display:flex;align-items:center;gap:10px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(201,150,46,0.15),transparent);}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--r3);border:1px solid rgba(201,150,46,0.3);color:var(--au5);padding:7px 16px;border-radius:20px;font-size:12px;font-weight:500;opacity:0;transition:all .3s;pointer-events:none;z-index:100;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.feedback-row{display:flex;gap:6px;align-items:center;margin-top:4px;padding-left:41px;}
.fb-btn{background:none;border:1px solid rgba(201,150,46,0.12);color:var(--dim);padding:3px 10px;border-radius:10px;font-size:11px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
.fb-btn:hover{background:rgba(201,150,46,0.1);color:var(--au4);}
.fb-btn.active{background:rgba(201,150,46,0.15);color:var(--au4);border-color:rgba(201,150,46,0.4);}

/* PROGRESS BAR */
.typing-status{font-size:10px;color:var(--dim);padding-left:41px;margin-top:-6px;height:14px;transition:opacity .3s;}
</style>
</head>

<div id="msgs">

</div>

<div id="input-zone">

// Math evaluator — handles expressions like "what is 12 * 8 + 3?"
function tryMath(raw) {
  const s = raw.replace(/what'?s|calculate|compute|solve|equals?|what is/gi, '').trim();
  const expr = s.replace(/[^0-9+\-*/.() %^]/g, '').trim();
  if (!expr || expr.length < 2) return null;
  try {
    // Safe eval: only allow numeric expressions
    if (!/^[\d\s+\-*/.()%^]+$/.test(expr)) return null;
    const safeExpr = expr.replace(/\^/g, '**');
    const result = Function('"use strict"; return (' + safeExpr + ')')();
    if (typeof result === 'number' && isFinite(result)) {
      return `The answer to **${expr.trim()}** is **${+result.toFixed(10)}** 🔢`;
    }
  } catch(e) {}
  return null;
}

// Score-based intent matching for KB topics
const KB_RULES = [
  { key:'greeting',     score: (s) => /^\s*(hi+|hello+|hey+|howdy|greetings|yo+|sup|hiya)\s*[!?.]?\s*$/i.test(s) ? 10 : 0 },
  { key:'services',     score: (s) => w(s, ['service','offer','feature','product','what do you do','what can you do','tell me about ruby','what does ruby']) },
  { key:'pricing',      score: (s) => w(s, ['pric','plan','cost','fee','how much','subscri','tier','cheap','afford','billing','invoice','payment','charge']) },
  { key:'support',      score: (s) => w(s, ['support','get help','raise a ticket','contact','talk to human','talk to agent','speak to someone','not working','broke','broken','stuck','issue','bug','error','problem','complaint']) },
  { key:'about',        score: (s) => w(s, ['about ruby','about the company','who made','who built','team','founders','mission','story','history','headquarter','based in','founded','started','office']) },
  { key:'api',          score: (s) => w(s, ['rest api','endpoint','sdk','developer','programm','connect via','integrate via','webhook','streaming','api key','api access','api call','api doc','http request']) },
  { key:'trial',        score: (s) => /trial|free trial|try for free|no credit card|sign up free|start free|get started free/.test(s) ? 8 : 0 },
  { key:'security',     score: (s) => w(s, ['secur','safe','encrypt','gdpr','privacy','data protect','compli','hipaa','soc 2','soc2','certif','pen test','audit','vulnerability']) },
  { key:'integrations', score: (s) => w(s, ['integrat','zapier','slack','salesforce','hubspot','crm','shopify','zendesk','intercom','make ','n8n','connect to','plug into','work with']) },
  { key:'demo',         score: (s) => /\b(book|schedule|request|arrange|watch)\b.*(demo|meeting|call|walkthrough|tour)|demo\b/.test(s) ? 8 : 0 },
  { key:'faq',          score: (s) => w(s, ['faq','frequently asked','common question','can i use','do you support','does it support','is there a','how do i','multiple website','multilingual','train the bot','what happens if']) },
  { key:'compare',      score: (s) => w(s, ['vs','versus','compare','alternative','competitor','intercom','zendesk','drift','better than','different from','switch from','why ruby']) },
];

function w(s, words) {
  return words.reduce((acc, word) => acc + (s.includes(word) ? 2 : 0), 0);
}

function getReply(raw) {
  const s = raw.toLowerCase().trim();

  // 1. Maths
  const mathResult = tryMath(raw);
  if (mathResult) return mathResult;

  // 2. Thanks / bye shortcuts
  if (/\b(thank(s| you)|cheers|appreciate|perfect|great|wonderful|awesome)\b/.test(s)) return { _special: 'thanks' };
  if (/\b(bye|goodbye|see you|ciao|later|done|that'?s all|no more)\b/.test(s)) return { _special: 'bye' };

  // 3. General knowledge rules
  for (const rule of GENERAL) {
    if (rule.skip) continue;
    const m = rule.useMatch ? s.match(rule.test) : rule.test.test(s);
    if (m) {
      const result = rule.useMatch ? rule.ans(m) : rule.ans();
      if (result) return result;
    }
  }

  // 4. KB intent scoring
  let best = null, bestScore = 0;
  for (const rule of KB_RULES) {
    const score = rule.score(s);
    if (score > bestScore) { bestScore = score; best = rule.key; }
  }
  if (best && bestScore >= 2 && KB[best]) return KB[best];

  // 5. Fuzzy fallback — try to acknowledge the question specifically
  return buildFallback(raw);
}

function buildFallback(raw) {
  const s = raw.toLowerCase();
  // Is it a question?
  const isQuestion = /\?$|^(what|who|where|when|why|how|can|is|are|do|does|will|would|could|should)\b/.test(s.trim());
  const starters = isQuestion
    ? [
        `That's a great question, but it's outside what I know for certain. For the most accurate answer, I'd recommend checking **docs.ruby.ai** or emailing **support@ruby.ai**.`,
        `I want to give you a precise answer on that, but it's beyond my current knowledge. Try **docs.ruby.ai** or ask our support team at **support@ruby.ai** — they're fast!`,
        `I'm not confident enough to answer that one accurately. Could you rephrase it, or try one of the topics below? Alternatively, our team at **support@ruby.ai** can help.`
      ]
    : [
        `Interesting — I'm not sure exactly what you're looking for there. Could you add a bit more detail or try rephrasing?`,
        `I want to make sure I give you the right answer. Could you clarify what you mean? Or browse the topics below.`,
        `Tell me more! I want to point you in exactly the right direction.`
      ];
  return pick(starters);
}

// ─── RENDER ───────────────────────────────────────────────────────────────────

function buildBubbleHTML(entry){
  if (!entry || typeof entry === 'string'){
    return `<div class="bubble">${fmt(typeof entry === 'string' ? entry : '')}</div>`;
  }
  let html = `<div class="bubble">${fmt(entry.short)}`;
  if (entry.sections && entry.sections.length){
    html += `<div class="expand-section">`;
    entry.sections.forEach((sec, i) => {
      const uid = `sec-${msgId}-${i}`;
      html += `
        <div class="expand-header" onclick="toggleSection('${uid}')">
          <span>${sec.title}</span>
          <span class="expand-arrow" id="arr-${uid}">▼</span>
        </div>
        <div class="expand-body" id="${uid}">${sec.body}</div>`;
    });
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

function toggleSection(uid){
  const body = document.getElementById(uid);
  const arr  = document.getElementById('arr-' + uid);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  arr.classList.toggle('open', !isOpen);
}

function addMsg(role, entry, id){
  const c   = document.getElementById('msgs');
  const el  = document.createElement('div');
  el.id     = 'msg-' + id;
  const bot = role === 'bot';

  const bubbleHTML = bot ? buildBubbleHTML(entry) : `<div class="bubble">${fmt(typeof entry === 'string' ? entry : entry.short)}</div>`;

  el.innerHTML = `<div class="row ${role}">
    <div class="av">${bot ? '🔥' : 'U'}</div>
    <div class="col">
      ${bubbleHTML}
      <div class="meta">
        ${bot ? '<span style="color:var(--au3);font-weight:600">Ruby AI</span> · ' : ''}${t()}
        ${bot ? `<div class="msg-actions">
          <button class="msg-act-btn" onclick="copyMsg(${id})">📋 Copy</button>
          <button class="msg-act-btn" onclick="feedbackMsg(${id},'up',this)">👍</button>
          <button class="msg-act-btn" onclick="feedbackMsg(${id},'down',this)">👎</button>
        </div>` : ''}
      </div>
    </div>
  </div>`;
  c.appendChild(el);
  c.scrollTop = c.scrollHeight;
}

function copyMsg(id){
  const el = document.querySelector(`#msg-${id} .bubble`);
  if (el) navigator.clipboard.writeText(el.innerText).then(() => toast('Copied to clipboard!'));
}

function feedbackMsg(id, dir, btn){
  document.querySelectorAll(`#msg-${id} .msg-act-btn`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  toast(dir === 'up' ? '👍 Thanks for the feedback!' : '👎 We\'ll work on that!');
}

// ─── MOOD TRANSFORM ──────────────────────────────────────────────────────────

function applyMood(entry){
  if (typeof entry === 'string'){
    return applyMoodStr(entry);
  }
  if (!entry || !entry.short) return entry;
  const clone = JSON.parse(JSON.stringify(entry));
  clone.short = applyMoodStr(clone.short);
  return clone;
}

function applyMoodStr(text){
  if (mood === 'concise'){
    const lines = text.split('\n');
    return lines.slice(0, 3).join('\n') + (lines.length > 3 ? '\n\n*(Concise mode — tap a section to expand)' : '');
  }
  if (mood === 'friendly') return '😊 ' + text;
  if (mood === 'formal')   return text.replace(/I'm\b/g,"I am").replace(/can't/g,"cannot").replace(/won't/g,"will not").replace(/don't/g,"do not");
  if (mood === 'creative') return '✨ ' + text + '\n\n*Curiosity is your compass — explore freely!*';
  if (mood === 'expert')   return '🧠 ' + text + '\n\n*Ask me to go deeper on any section above.*';
  if (mood === 'mentor')   return '🎓 ' + text + '\n\n*Take your time — expand the sections that interest you most.*';
  return text;
}

// ─── REPLY LOGIC ─────────────────────────────────────────────────────────────

function botReply(text){
  busy = true;
  document.getElementById('send').disabled = true;

  // Typing delay proportional to response complexity
  const delay = 500 + Math.min(text.length * 8, 800);
  showTyping('Thinking…');

  setTimeout(()=>{
    removeTyping();
    const raw = getReply(text);

    let entry;
    if (raw && raw._special === 'thanks') {
      entry = pick(KB.thanks);
    } else if (raw && raw._special === 'bye') {
      entry = KB.bye;
    } else {
      entry = raw;
    }

    const final = applyMood(entry);
    addMsg('bot', final, ++msgId);
    busy = false;
    document.getElementById('send').disabled = !document.getElementById('inp').value.trim();
    if (msgId >= 6 && msgId % 5 === 1) setTimeout(() => addSugCard(TOPICS), 600);
  }, delay);
}

function pickTopic(label, key, removeEl){
  removeEl?.remove();
  document.getElementById('qr-block')?.remove();
  addMsg('user', label, ++msgId);
  busy = true;
  document.getElementById('send').disabled = true;
  showTyping(`Loading ${label}…`);
  setTimeout(()=>{
    removeTyping();
    const entry = KB[key] || pick(KB.default);
    const final = applyMood(entry);
    addMsg('bot', final, ++msgId);
    busy = false;
    document.getElementById('send').disabled = !document.getElementById('inp').value.trim();
  }, 500 + Math.random() * 400);
}

function sendMsg(){
  const inp  = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text || busy) return;
  document.getElementById('qr-block')?.remove();
  document.getElementById('sug-block')?.remove();
  addMsg('user', text, ++msgId);
  inp.value = ''; inp.style.height = 'auto';
  document.getElementById('cc').textContent = '0 / 600';
  document.getElementById('send').disabled = true;
  botReply(text);
}

function onInp(el){
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  const len = el.value.length;
  document.getElementById('cc').textContent = `${len} / 600`;
  document.getElementById('cc').style.color = len > 550 ? 'var(--rmist)' : '';
  document.getElementById('send').disabled = !el.value.trim() || busy;
}

function onKey(e){ if (e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMsg(); } }

function setMood(chip, key){
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  mood = key;
  toast('Tone: ' + chip.textContent.trim());
}

function clearChat(){
  const c = document.getElementById('msgs');
  c.innerHTML = '<div class="divider">Session Cleared</div>';
  msgId = 0;
  busy  = false;
  init();
  toast('Chat cleared');
}

function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ─── INIT ────────────────────────────────────────────────────────────────────

function init(){
  addMsg('bot', {
    short: "Welcome to **Ruby AI** — Crimson Edition 🔥\n\nI'm your intelligent assistant. Ask me anything about services, pricing, API, security, integrations, and more — or tap a topic below to explore in detail.",
    sections: []
  }, ++msgId);
  setTimeout(() => addQuick(WELCOME_QUICK), 450);
}

init();
</script>
